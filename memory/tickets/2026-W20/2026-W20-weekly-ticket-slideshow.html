<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weekly Delivery Narrative - 2026-W20</title>
  <style>
    :root {
      --bg: #f4eee4;
      --ink: #211b17;
      --muted: #655b52;
      --line: rgba(33,27,23,0.10);
      --card: rgba(255,255,255,0.74);
      --accent: #b85b37;
      --accent2: #2f655d;
      --accent3: #d3a34a;
      --shadow: 0 20px 44px rgba(30, 22, 15, 0.10);
      --fit: 1;
      --stage-w: 1920;
      --stage-h: 1080;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, #fff9f1 0%, #f4eee4 50%, #e9dece 100%);
      color: var(--ink);
      font-family: "Aptos", "Segoe UI Variable Text", "Trebuchet MS", sans-serif;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(130deg, rgba(184,91,55,0.08), transparent 34%),
        linear-gradient(310deg, rgba(47,101,93,0.08), transparent 34%),
        repeating-linear-gradient(90deg, rgba(33,27,23,0.016) 0 1px, transparent 1px 140px);
    }
    .viewport {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    .stage-shell {
      position: absolute;
      left: 50%;
      top: 50%;
      width: calc(var(--stage-w) * 1px);
      height: calc(var(--stage-h) * 1px);
      transform: translate(-50%, -50%) scale(var(--fit));
      transform-origin: center center;
    }
    .deck {
      position: relative;
      display: flex;
      width: calc(var(--stage-w) * 1px);
      height: calc(var(--stage-h) * 1px);
      transition: transform 320ms ease;
    }
    .slide {
      width: calc(var(--stage-w) * 1px);
      height: calc(var(--stage-h) * 1px);
      flex: 0 0 calc(var(--stage-w) * 1px);
      padding: 50px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 20px;
    }
    .eyebrow {
      font-size: 14px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 800;
      color: var(--muted);
    }
    h1, h2 {
      margin: 0;
      line-height: 0.96;
      font-family: "Georgia", "Iowan Old Style", serif;
      font-weight: 700;
      max-width: 13ch;
    }
    h1 { font-size: 78px; }
    h2 { font-size: 52px; }
    .subtitle {
      font-size: 25px;
      line-height: 1.3;
      color: var(--muted);
      max-width: 52rem;
    }
    .grid-2, .grid-3, .grid-4, .flow, .chain, .priority-list, .commitments {
      display: grid;
      gap: 16px;
      align-content: start;
    }
    .grid-2 { grid-template-columns: 1.15fr 0.85fr; }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    .flow { grid-template-columns: repeat(5, 1fr); }
    .chain { grid-template-columns: repeat(3, 1fr); align-items: stretch; }
    .card, .theme, .metric, .step, .priority-item, .commitment-item, .lane {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }
    .card, .theme, .metric, .step, .priority-item, .commitment-item { padding: 22px; }
    .kicker {
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .big-copy {
      font-size: 34px;
      line-height: 1.08;
      max-width: 18ch;
    }
    .support {
      font-size: 20px;
      line-height: 1.42;
      color: var(--muted);
      max-width: 58rem;
    }
    .theme { min-height: 156px; display: grid; gap: 8px; }
    .theme-title { font-size: 25px; font-weight: 800; }
    .theme-copy { font-size: 17px; line-height: 1.42; color: var(--muted); }
    .status-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(33,27,23,0.06);
    }
    .pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }
    .done { color: var(--accent2); }
    .review { color: var(--accent); }
    .mixed { color: #7b5d27; }
    .metric {
      min-height: 168px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .metric em {
      font-style: normal;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 800;
    }
    .metric strong {
      font-size: 48px;
      line-height: 1;
      font-family: "Georgia", serif;
    }
    .metric span {
      font-size: 17px;
      line-height: 1.36;
      color: var(--muted);
    }
    .step {
      min-height: 196px;
      position: relative;
      display: grid;
      gap: 10px;
    }
    .step:not(:last-child)::after {
      content: "→";
      position: absolute;
      right: -14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 26px;
      color: var(--muted);
    }
    .step strong { font-size: 21px; }
    .step p { margin: 0; font-size: 16px; line-height: 1.42; color: var(--muted); }
    .lane-box { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; }
    .lane { padding: 10px 14px; font-size: 15px; line-height: 1.35; }
    .priority-item, .commitment-item { display: grid; gap: 7px; }
    .priority-item strong, .commitment-item strong { font-size: 20px; }
    .priority-item p, .commitment-item p { margin: 0; font-size: 16px; line-height: 1.4; color: var(--muted); }
    .chain .card { min-height: 250px; position: relative; }
    .chain .card:not(:last-child)::after {
      content: "→";
      position: absolute;
      right: -17px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 30px;
      color: var(--accent);
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--muted);
    }
    .nav {
      position: fixed;
      right: 20px;
      bottom: 18px;
      display: flex;
      gap: 8px;
      z-index: 20;
    }
    .nav button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(33,27,23,0.88);
      color: #fff;
      cursor: pointer;
    }
    .counter {
      position: fixed;
      left: 20px;
      bottom: 20px;
      z-index: 20;
      font-size: 14px;
      color: var(--muted);
    }
    .hint {
      position: fixed;
      left: 20px;
      top: 18px;
      z-index: 20;
      font-size: 13px;
      color: var(--muted);
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      box-shadow: var(--shadow);
    }
  </style>
</head>
<body>
  <div class="viewport">
    <div class="stage-shell" id="stageShell">
      <div class="deck" id="deck"></div>
    </div>
  </div>
  <div class="hint">Press <strong>P</strong> for presenter view</div>
  <div class="counter" id="counter">1 / 8</div>
  <div class="nav">
    <button type="button" id="prev">Prev</button>
    <button type="button" id="next">Next</button>
  </div>
  <script>
    const slides = [
      {
        title: "Weekly Delivery Narrative",
        noteTitle: "Opening",
        body: `
          <div class="eyebrow">2026-W20 Weekly Review</div>
          <h1>Visible fixes closed the week, and the remaining work is clear.</h1>
          <div class="subtitle">This week focused on admin usability, checkout accuracy, and marketplace admin behavior.</div>
          <div class="grid-2">
            <div class="card">
              <div class="kicker">Week summary</div>
              <div class="big-copy">We spent the week fixing behavior people can see and checking that the fixes actually worked.</div>
            </div>
            <div class="card">
              <div class="kicker">End of week</div>
              <div class="status-row">
                <span class="pill done">6 Done</span>
                <span class="pill review">4 Pending Review</span>
                <span class="pill mixed">No major blockers</span>
              </div>
            </div>
          </div>
          <div class="footer"><span>Weekly Delivery Narrative</span><span>01</span></div>
        `,
        notes: `This week was mainly about fixing and checking user-facing behavior. We were not pushing a large new feature. Instead, the work improved how existing flows behave in practice. By the end of the week, six items were done and four were left in pending review. The important point is that the remaining work is already defined, so we are going into next week with a clear follow-up list rather than an open problem set.`
      },
      {
        title: "The Week's Story",
        noteTitle: "Story",
        body: `
          <div class="eyebrow">The Week's Story</div>
          <h2>The work fits into three clear areas instead of a long ticket list.</h2>
          <div class="grid-3">
            <div class="theme">
              <div class="theme-title">Checkout accuracy</div>
              <div class="theme-copy">Receipt values, discount breakdowns, and pay-link behavior were corrected or confirmed.</div>
            </div>
            <div class="theme">
              <div class="theme-title">Marketplace admin</div>
              <div class="theme-copy">Error messages and access issues were made clearer, and fixes were checked in staging.</div>
            </div>
            <div class="theme">
              <div class="theme-title">Admin usability</div>
              <div class="theme-copy">Search, refresh, copy, and table behavior were narrowed into a focused review queue.</div>
            </div>
          </div>
          <div class="card">
            <div class="kicker">Why this matters</div>
            <div class="support">The common thread is simple: people get more accurate information and fewer confusing interactions in places they use often.</div>
          </div>
          <div class="footer"><span>Grouped by theme</span><span>02</span></div>
        `,
        notes: `The clearest way to explain the week is to group it into three areas. First, we improved checkout accuracy, which matters because price and payment details need to be right when users finish a transaction. Second, we cleaned up marketplace admin behavior, especially around unclear errors and access issues. Third, we collected a set of smaller admin usability issues into a short review queue. That grouping is more useful than walking through every ticket one by one.`
      },
      {
        title: "Executive Snapshot",
        noteTitle: "Snapshot",
        body: `
          <div class="eyebrow">Executive Snapshot</div>
          <h2>The week shows checked fixes and a small amount of carryover.</h2>
          <div class="grid-4">
            <div class="metric"><em>Done</em><strong>6</strong><span>Fixes reached done by week close.</span></div>
            <div class="metric"><em>Pending review</em><strong>4</strong><span>Remaining work is already narrowed and ready for follow-through.</span></div>
            <div class="metric"><em>Main themes</em><strong>3</strong><span>The activity clustered in clear product areas.</span></div>
            <div class="metric"><em>Checked</em><strong>Yes</strong><span>Several completed items were verified in staging.</span></div>
          </div>
          <div class="card">
            <div class="kicker">Readout</div>
            <div class="support">The useful takeaway is that this was not just ticket movement. Several changes were checked and confirmed, while the unfinished items remained manageable.</div>
          </div>
          <div class="footer"><span>Short read for stakeholders</span><span>03</span></div>
        `,
        notes: `At a high level, the week ended in a better state than it started. The closed items were not only implemented but, in several cases, also verified in staging. That gives us more confidence than a raw status change alone. The remaining four items are not scattered across many teams or systems. They sit in a compact queue, which means next week can start with execution rather than re-analysis.`
      },
      {
        title: "Activity Flow",
        noteTitle: "Flow",
        body: `
          <div class="eyebrow">Activity Flow</div>
          <h2>Issues were captured, worked, checked, and then carried over only where needed.</h2>
          <div class="flow">
            <div class="step"><strong>Captured</strong><p>Problems were written up with enough detail to make handoff easier.</p></div>
            <div class="step"><strong>Worked</strong><p>Fixes moved into staging-ready or review-ready states during the week.</p></div>
            <div class="step"><strong>Checked</strong><p>Reporting search, transaction details, marketplace messaging, and app installs were verified.</p></div>
            <div class="step"><strong>Queued</strong><p>Search, refresh, copy, and table issues remained as the short next list.</p></div>
            <div class="step"><strong>Closed week</strong><p>The week ended with limited carryover and no major blocker driving the story.</p></div>
          </div>
          <div class="lane-box">
            <div class="lane">Done: NGN-561, NGN-562, NGN-589, NGN-590, NGN-624, NGN-628</div>
            <div class="lane">Pending Review: NGN-600, NGN-630, NGN-631, NGN-632</div>
          </div>
          <div class="footer"><span>Movement through the week</span><span>04</span></div>
        `,
        notes: `This slide shows the pace of the work. The pattern was straightforward. Issues were first captured clearly, then moved into implementation or review, and then checked where possible. That matters because it shows the team was closing the loop on visible problems rather than only filing them. The carryover work also makes sense. It is mostly usability follow-through, not a sign that the week got stuck.`
      },
      {
        title: "Priority Work",
        noteTitle: "Priority tickets",
        body: `
          <div class="eyebrow">Priority Work</div>
          <h2>A few tickets explain the week better than the full list.</h2>
          <div class="priority-list">
            <div class="priority-item"><strong>NGN-589 · Done</strong><p>Item prices on the payment complete page now show correctly after Pay Link checkout.</p></div>
            <div class="priority-item"><strong>NGN-562 · Done</strong><p>Discounted transaction details were checked so subtotal, discount, and total charge values line up.</p></div>
            <div class="priority-item"><strong>NGN-624 and NGN-628 · Done</strong><p>Marketplace admin now gives clearer feedback and no longer shows the earlier access-related failure behavior.</p></div>
            <div class="priority-item"><strong>NGN-600, NGN-630, NGN-631, NGN-632 · Pending Review</strong><p>The remaining queue covers search reloads, stale refresh behavior, clipboard copy, and customer table navigation.</p></div>
          </div>
          <div class="footer"><span>Representative work</span><span>05</span></div>
        `,
        notes: `If we only call out a few tickets, these are the right ones to use. The checkout items matter because they affect what users see after payment and in transaction details. The marketplace items matter because they replace unclear behavior with clearer admin feedback. The remaining pending-review tickets matter because they define the next week. Together, these tickets show both what was finished and what still needs to be closed.`
      },
      {
        title: "What Changed",
        noteTitle: "Impact",
        body: `
          <div class="eyebrow">What Changed</div>
          <h2>The main change is that several common workflows now behave more clearly.</h2>
          <div class="chain">
            <div class="card"><div class="kicker">Before</div><div class="big-copy">People could run into wrong values, unclear errors, or interactions that broke their flow.</div></div>
            <div class="card"><div class="kicker">This week</div><div class="big-copy">The team fixed visible problems and checked the results where the evidence mattered most.</div></div>
            <div class="card"><div class="kicker">Now</div><div class="big-copy">Several checkout, reporting, and admin flows are easier to trust, and the remaining gaps are clearly named.</div></div>
          </div>
          <div class="footer"><span>Problem to result</span><span>06</span></div>
        `,
        notes: `The most important change is not the ticket count. It is that several workflows now behave more clearly from a user point of view. When values are correct, when error messages are readable, and when interactions do not break unexpectedly, the product becomes easier to use and easier to trust. That is the real result of the week's work, and it is the point I would emphasize most strongly.`
      },
      {
        title: "Next-Week Commitments",
        noteTitle: "Next week",
        body: `
          <div class="eyebrow">Next-Week Commitments</div>
          <h2>The remaining work is small enough to push through review and close.</h2>
          <div class="commitments">
            <div class="commitment-item"><strong>NGN-600</strong><p>Finish the Partner Users search fix so typing is not interrupted by a full page reload.</p></div>
            <div class="commitment-item"><strong>NGN-630</strong><p>Finish the service provider refresh fix so new providers appear without a manual reload.</p></div>
            <div class="commitment-item"><strong>NGN-631</strong><p>Finish the clipboard copy fix in Customer Details so the copy action works cleanly.</p></div>
            <div class="commitment-item"><strong>NGN-632</strong><p>Finish the customer table fix so larger result sets remain usable and visible.</p></div>
          </div>
          <div class="footer"><span>Clear follow-through</span><span>07</span></div>
        `,
        notes: `Next week does not need a new discovery effort. The work is already identified. The main job is to move these four items through review, validation, and closure. That is a good position to be in, because it means the team can start the week with a clear list and a clear end state for each item.`
      },
      {
        title: "Closing Position",
        noteTitle: "Close",
        body: `
          <div class="eyebrow">Closing Position</div>
          <h2>The week ended with real fixes in place and a short next list.</h2>
          <div class="grid-2">
            <div class="card">
              <div class="kicker">What is done</div>
              <div class="big-copy">Several user-facing fixes were already verified in staging by week close.</div>
            </div>
            <div class="card">
              <div class="kicker">What is next</div>
              <div class="big-copy">Use the pending-review queue as the first execution target next week.</div>
            </div>
          </div>
          <div class="card">
            <div class="kicker">Bottom line</div>
            <div class="support">This was a solid maintenance and quality week. It reduced visible issues, confirmed several fixes, and left a manageable list to finish.</div>
          </div>
          <div class="footer"><span>Weekly Delivery Narrative · 2026-W20</span><span>08</span></div>
        `,
        notes: `The closing message is simple. The week reduced visible problems and confirmed several fixes, and it did so without leaving behind a messy follow-up story. The remaining work is short, specific, and ready to close. That is how I would end the presentation: the week produced concrete cleanup and set up a clear starting point for the next one.`
      }
    ];

    const deck = document.getElementById('deck');
    const counter = document.getElementById('counter');
    const prev = document.getElementById('prev');
    const next = document.getElementById('next');
    const channelName = 'weekly-ticket-slideshow-2026-w20';
    const channel = ('BroadcastChannel' in window) ? new BroadcastChannel(channelName) : null;
    let presenterWindow = null;
    let index = 0;

    slides.forEach((slide) => {
      const section = document.createElement('section');
      section.className = 'slide';
      section.innerHTML = slide.body;
      deck.appendChild(section);
    });

    function fitStage() {
      const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      document.documentElement.style.setProperty('--fit', scale.toFixed(4));
    }

    function persist() {
      const payload = { index, source: 'audience', at: Date.now() };
      localStorage.setItem(channelName, JSON.stringify(payload));
      if (channel) channel.postMessage(payload);
      if (window.parent && window.parent !== window) {
        window.parent.postMessage({ type: 'audience-index', index }, '*');
      }
    }

    function render(skipSync = false) {
      deck.style.transform = `translateX(-${index * 1920}px)`;
      counter.textContent = `${index + 1} / ${slides.length}`;
      prev.disabled = index === 0;
      next.disabled = index === slides.length - 1;
      prev.style.opacity = prev.disabled ? '0.45' : '1';
      next.style.opacity = next.disabled ? '0.45' : '1';
      if (!skipSync) persist();
    }

    function move(delta) {
      index = Math.max(0, Math.min(slides.length - 1, index + delta));
      render();
    }

    function openPresenterView() {
      const presenterUrl = './2026-W20-weekly-ticket-slideshow-presenter.html';
      if (presenterWindow && !presenterWindow.closed) {
        presenterWindow.focus();
      } else {
        presenterWindow = window.open(presenterUrl, 'weekly-ticket-presenter', 'popup=yes,width=1600,height=900');
      }
      persist();
    }

    prev.addEventListener('click', () => move(-1));
    next.addEventListener('click', () => move(1));
    window.addEventListener('keydown', (event) => {
        if (event.key === 'ArrowRight' || event.key === 'PageDown' || event.key === ' ') move(1);
        if (event.key === 'ArrowLeft' || event.key === 'PageUp') move(-1);
        if (event.key === 'p' || event.key === 'P') openPresenterView();
    });
    window.addEventListener('resize', fitStage);
    window.addEventListener('message', (event) => {
      const payload = event.data || {};
      if (payload.type === 'set-index' && typeof payload.index === 'number') {
        index = Math.max(0, Math.min(slides.length - 1, payload.index));
        render(true);
      }
    });
    window.addEventListener('storage', (event) => {
      if (event.key !== channelName || !event.newValue) return;
      const payload = JSON.parse(event.newValue);
      if (typeof payload.index === 'number' && payload.source !== 'audience') {
        index = Math.max(0, Math.min(slides.length - 1, payload.index));
        render(true);
      }
    });
    if (channel) {
      channel.onmessage = (event) => {
        const payload = event.data || {};
        if (typeof payload.index === 'number' && payload.source !== 'audience') {
          index = Math.max(0, Math.min(slides.length - 1, payload.index));
          render(true);
        }
      };
    }

    fitStage();
    render(true);
    persist();
  </script>
</body>
</html>
