<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Presenter View - Weekly Delivery Narrative - 2026-W20</title>
  <style>
    :root { --bg: #181411; --panel: #231d18; --ink: #f7f1ea; --muted: #c3b4a6; --line: rgba(255,255,255,0.10); --fit: 0.38; }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: radial-gradient(circle at top left, #2b241d 0%, #181411 60%, #120f0d 100%); color: var(--ink); font-family: "Aptos", "Segoe UI Variable Text", sans-serif; }
    .app { display: grid; grid-template-columns: 1.06fr 0.94fr; width: 100vw; height: 100vh; gap: 18px; padding: 18px; }
    .panel { background: rgba(35,29,24,0.90); border: 1px solid var(--line); border-radius: 24px; overflow: hidden; min-width: 0; min-height: 0; box-shadow: 0 18px 44px rgba(0,0,0,0.24); }
    .preview-panel { display: grid; grid-template-rows: auto 1fr auto; }
    .preview-head, .notes-head { display: flex; justify-content: space-between; align-items: center; padding: 16px 18px; border-bottom: 1px solid var(--line); color: var(--muted); font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 800; }
    .preview-wrap { position: relative; overflow: hidden; background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 30%); }
    .stage-shell { position: absolute; left: 50%; top: 50%; width: 1920px; height: 1080px; transform: translate(-50%, -50%) scale(var(--fit)); transform-origin: center center; border-radius: 24px; overflow: hidden; box-shadow: 0 12px 34px rgba(0,0,0,0.28); }
    iframe { width: 1920px; height: 1080px; border: 0; display: block; background: #fff; }
    .preview-foot { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 14px 18px; border-top: 1px solid var(--line); }
    .nav { display: flex; gap: 8px; }
    .nav button { border: 0; border-radius: 999px; padding: 10px 14px; font-size: 12px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; background: rgba(255,255,255,0.12); color: var(--ink); cursor: pointer; }
    .meta { display: flex; gap: 14px; flex-wrap: wrap; color: var(--muted); font-size: 14px; }
    .notes-panel { display: grid; grid-template-rows: auto auto 1fr; min-height: 0; }
    .notes-title { padding: 20px 22px 10px; border-bottom: 1px solid var(--line); }
    .notes-title h1 { margin: 0 0 8px 0; font-family: "Georgia", serif; font-size: 34px; line-height: 1.02; }
    .notes-title p { margin: 0; color: var(--muted); font-size: 16px; line-height: 1.4; }
    .notes-body { padding: 22px; overflow: auto; min-height: 0; display: grid; align-content: start; gap: 14px; }
    .notes-body p { margin: 0; color: #f1e7dc; font-size: 20px; line-height: 1.65; }
    .status-line { display: flex; justify-content: space-between; gap: 12px; padding: 0 22px 14px; color: var(--muted); font-size: 14px; border-bottom: 1px solid var(--line); }
    @media (max-width: 1200px) { .app { grid-template-columns: 1fr; grid-template-rows: 0.9fr 1.1fr; } }
  </style>
</head>
<body>
  <div class="app">
    <section class="panel preview-panel">
      <div class="preview-head"><span>Presenter Preview</span><span id="counter">1 / 13</span></div>
      <div class="preview-wrap"><div class="stage-shell"><iframe id="slideFrame" src="./2026-W20-weekly-ticket-slideshow.html" title="Audience deck"></iframe></div></div>
      <div class="preview-foot"><div class="nav"><button type="button" id="prev">Prev</button><button type="button" id="next">Next</button></div><div class="meta"><span id="slideLabel">Opening</span><span>Synced presenter notes</span></div></div>
    </section>
    <section class="panel notes-panel">
      <div class="notes-head"><span>Speaker Script</span><span>Read as-is or adapt lightly</span></div>
      <div class="notes-title"><h1 id="notesTitle">Weekly Delivery Narrative</h1><p id="notesSubtitle">Opening overview for the week.</p></div>
      <div class="status-line"><span id="slideTitleLine">Opening</span><span>2026-W20</span></div>
      <div class="notes-body" id="notesBody"></div>
    </section>
  </div>
  <script>
    const slides = [
      { title: 'Weekly Delivery Narrative', noteTitle: 'Opening', noteSubtitle: 'Explain the structure change before the week itself.', notes: `This version of the deck is intentionally more detailed. Instead of grouping everything into a few broad themes, it walks ticket by ticket so the audience can see the actual work behind the week. The headline is still simple: six items ended done, four stayed in pending review, and several of the completed items include explicit staging verification.` },
      { title: 'Weekly Map', noteTitle: 'Week map', noteSubtitle: 'Use counts to frame the week, then move quickly into the ticket slides.', notes: `On this slide, I would frame the week in two buckets. One bucket is verified fixes and checks. The other bucket is follow-up work that was clearly documented but did not close yet. There were ten tracked items in total. Four or more of the done items include direct staging validation, and the open items are already narrow enough to carry into next week without more discovery.` },
      { title: 'NGN-561', noteTitle: 'NGN-561', noteSubtitle: 'Explain the verification work across all reporting tables.', notes: `Here the main point is that this was a verification-heavy ticket. The problem had been noisy search behavior in Reporting because each keypress fired a GraphQL request. My in-week contribution was the staging validation. The dump shows a clear PASS result and names the exact tables that were checked, so this was not just marked done. It was actually verified across Transactions, Batches, Deposits, and Disputes.` },
      { title: 'NGN-589', noteTitle: 'NGN-589', noteSubtitle: 'Cover the full path from issue creation to staging confirmation.', notes: `This ticket is one of the stronger end-to-end stories in the week. The issue was that the Payment Complete page was not showing the correct item-level prices after a Pay Link checkout. The notes then show implementation follow-through and a ready-for-verification handoff. After that, the staging result confirmed the corrected receipt behavior. So this slide shows problem definition, fix path, and verification all in one place.` },
      { title: 'NGN-590', noteTitle: 'NGN-590', noteSubtitle: 'Be honest that the documentation trail is lighter here.', notes: `This one is still worth calling out even though the in-week trail is thinner. The ticket covered multi-use Pay Links being marked completed too early, which is a real checkout lifecycle problem, not just a display issue. In the weekly dump, the strongest evidence is the original problem statement and the final done status. I would present that honestly: it ended done, but the recorded notes for this week are lighter than the other completed items.` },
      { title: 'NGN-600', noteTitle: 'NGN-600', noteSubtitle: 'Keep the focus on the typing-flow problem and the open state.', notes: `This ticket stayed open, but it is still a meaningful part of the week. The issue is that Partner Users search was reloading the whole iframe and causing the input to lose focus while typing. The value of this ticket is that the problem was captured precisely enough to turn it into a focused review item. So the audience should hear both parts: the UX problem is clear, and the work remains in the next queue rather than being solved this week.` },
      { title: 'NGN-562', noteTitle: 'NGN-562', noteSubtitle: 'Call out the fresh-transaction validation and the stale-data caveat.', notes: `This slide is another strong QA example. The ticket covered incorrect breakdown values for discounted Pay Link transactions. The important part of the validation is that it was done on a newly created discounted transaction, not on old data. The staging comment also includes a useful caveat that an older reference row could still look stale because it existed before the fix. That makes the verification more credible and more informative.` },
      { title: 'NGN-624', noteTitle: 'NGN-624', noteSubtitle: 'Show the move from raw backend error to readable admin feedback.', notes: `NGN-624 is a clean example of user-facing improvement in admin tooling. The original problem was a raw duplicate-slug Prisma error leaking into the category creation flow. The ticket was created and then verified in staging the same week. I would emphasize that the outcome was not just no error. The outcome was a readable validation response, which is a better admin experience and easier to support.` },
      { title: 'NGN-628', noteTitle: 'NGN-628', noteSubtitle: 'Treat this as access-behavior verification rather than generic bug fixing.', notes: `This ticket covered the App Installs page failing with environment and permission-related GraphQL errors. The weekly dump shows the issue creation and a later staging check that says the page now loads for the tested user without those failures. I would present this as a verification of restored access behavior. It is distinct from the checkout work and helps show the variety of issues covered during the week.` },
      { title: 'NGN-630', noteTitle: 'NGN-630', noteSubtitle: 'Explain the stale-list behavior and why it remains next-week work.', notes: `This is one of the remaining marketplace admin follow-ups. The issue is straightforward: after creating a service provider, the list does not refresh to show the new entry until the page is manually reloaded. The ticket does not have a closing note yet, so I would keep the message simple. The problem is well defined, the expected behavior is clear, and it remains part of the next queue.` },
      { title: 'NGN-631', noteTitle: 'NGN-631', noteSubtitle: 'Keep the explanation precise around clipboard permissions.', notes: `The important detail on this slide is that the failure was traced to clipboard permissions policy, not just to a generic broken copy action. That makes the issue more actionable. The ticket stayed in pending review, but it already tells us where the problem lives and what behavior needs to be restored in Customer Details.` },
      { title: 'NGN-632', noteTitle: 'NGN-632', noteSubtitle: 'Describe both the cut-off rows and the missing navigation controls.', notes: `For NGN-632, I would explain that the problem is two-part. The Customers table cuts off visible entries when the result set is large, and the view also lacks enough navigation to reach the rest. That makes it more than cosmetic table polish. It affects whether the data can be used properly. The work remained open, but the scope is already concrete.` },
      { title: 'Close', noteTitle: 'Close', noteSubtitle: 'Sum up verified closures versus the defined open queue.', notes: `To close, I would separate the week into two outcomes. First, several tickets ended with strong evidence, not just status changes. That includes the reporting debounce check, the discounted transaction validation, the checkout receipt fix, and the marketplace admin verification items. Second, the remaining four tickets are already specific enough to pick up next week without more rediscovery. That is why this ticket-level version of the deck is more useful. It shows the real work, the proof behind the closed items, and the exact shape of the open queue.` }
    ];
    const channelName = 'weekly-ticket-slideshow-2026-w20'; const channel = ('BroadcastChannel' in window) ? new BroadcastChannel(channelName) : null; const slideFrame = document.getElementById('slideFrame'); const counter = document.getElementById('counter'); const slideLabel = document.getElementById('slideLabel'); const notesTitle = document.getElementById('notesTitle'); const notesSubtitle = document.getElementById('notesSubtitle'); const notesBody = document.getElementById('notesBody'); const slideTitleLine = document.getElementById('slideTitleLine'); const prev = document.getElementById('prev'); const next = document.getElementById('next'); let index = 0;
    function fitPreview() { const wrap = document.querySelector('.preview-wrap'); const scale = Math.min(wrap.clientWidth / 1920, wrap.clientHeight / 1080); document.documentElement.style.setProperty('--fit', Math.max(scale, 0.2).toFixed(4)); }
    function renderNotes() { const slide = slides[index]; counter.textContent = `${index + 1} / ${slides.length}`; slideLabel.textContent = slide.noteTitle; notesTitle.textContent = slide.title; notesSubtitle.textContent = slide.noteSubtitle; slideTitleLine.textContent = slide.noteTitle; notesBody.innerHTML = slide.notes.split(/\n\n+/).map(paragraph => `<p>${paragraph}</p>`).join(''); prev.disabled = index === 0; next.disabled = index === slides.length - 1; prev.style.opacity = prev.disabled ? '0.45' : '1'; next.style.opacity = next.disabled ? '0.45' : '1'; }
    function sync(source) { const payload = { index, source, at: Date.now() }; localStorage.setItem(channelName, JSON.stringify(payload)); if (channel) channel.postMessage(payload); }
    function setIndex(nextIndex, source, broadcast = true) { index = Math.max(0, Math.min(slides.length - 1, nextIndex)); renderNotes(); if (slideFrame.contentWindow) { slideFrame.contentWindow.postMessage({ type: 'set-index', index }, '*'); } if (broadcast) sync(source); }
    prev.addEventListener('click', () => setIndex(index - 1, 'presenter')); next.addEventListener('click', () => setIndex(index + 1, 'presenter')); window.addEventListener('keydown', (event) => { if (event.key === 'ArrowRight' || event.key === 'PageDown' || event.key === ' ') setIndex(index + 1, 'presenter'); if (event.key === 'ArrowLeft' || event.key === 'PageUp') setIndex(index - 1, 'presenter'); }); window.addEventListener('resize', fitPreview); window.addEventListener('storage', (event) => { if (event.key !== channelName || !event.newValue) return; const payload = JSON.parse(event.newValue); if (typeof payload.index === 'number' && payload.source !== 'presenter') { setIndex(payload.index, 'presenter-mirror', false); } }); if (channel) { channel.onmessage = (event) => { const payload = event.data || {}; if (typeof payload.index === 'number' && payload.source !== 'presenter') { setIndex(payload.index, 'presenter-mirror', false); } }; } window.addEventListener('message', (event) => { const payload = event.data || {}; if (payload.type === 'audience-index' && typeof payload.index === 'number') { setIndex(payload.index, 'presenter-mirror', false); } }); slideFrame.addEventListener('load', () => { setIndex(index, 'presenter-mirror', false); });
    fitPreview(); renderNotes();
  </script>
</body>
</html>
