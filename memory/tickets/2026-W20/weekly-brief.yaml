week: "2026-W20"
title: "Weekly Delivery Narrative - 2026-W20"
subtitle: "Checkout accuracy, reporting debounce, marketplace admin fixes, and admin usability follow-through"
summary:
  objective: "The week covered checkout and reporting fixes, marketplace admin error handling, and a focused set of admin usability issues moved into review."
  why_it_matters: "The brief shows six completed items with staging verification, four review-ready tickets with concrete scope, and no major blockers."
  evidence:
    - "6 tickets were done by week close."
    - "4 tickets remained in pending review."
    - "Multiple completed items were verified in staging with explicit PASS results."
sections:
  - key: "weekly-story"
    title: "The Week's Story"
    objective_summary: "The work grouped into checkout accuracy, reporting performance, marketplace admin fixes, and admin usability follow-through."
    why_it_matters: "Grouping the work shows the shape of the week, while the detail below shows what was actually done."
    supporting_evidence:
      - "Checkout-related tickets addressed price display, discount breakdowns, and pay-link lifecycle behavior."
      - "Reporting-related tickets addressed excessive GraphQL request volume from search keystrokes."
      - "Marketplace-related tickets addressed unclear admin errors, access behavior, and stale list refresh."
      - "Admin usability tickets covered search reload, clipboard copy, and table navigation behavior."
    work_detail:
      - "NGN-561: verified debounced search behavior across all four Reporting tables in staging."
      - "NGN-589: corrected item prices on the Payment Complete page after Pay Link checkout."
      - "NGN-562: checked discounted transaction detail values on fresh transactions and confirmed expected values."
      - "NGN-590: created ticket to keep Multi-Use Pay Links active and increment usage count correctly instead of marking completed early."
      - "NGN-624 and NGN-628: handled marketplace admin error and access issues with passing verification."
      - "NGN-600, NGN-630, NGN-631, and NGN-632: carried usability issues into review with concrete reproduction and scope."
    presenter_notes: "Start with the four work areas, then name the tickets that best show the work in each area. Keep the explanation simple and use the ticket detail to show what was done rather than speaking only in themes. Mention that Wednesday and Friday had no qualifying ticket activity, so the active days were Monday, Tuesday, and Thursday."
    takeaway: "The week was concentrated in a few visible workflows, with concrete ticket work in each one."
  - key: "executive-snapshot"
    title: "Executive Snapshot"
    objective_summary: "The week closed with six done items and four pending-review items."
    why_it_matters: "The remaining work is limited in scope and already defined. No major blockers were reported."
    supporting_evidence:
      - "Several completed items were verified in staging with explicit PASS results."
      - "No major blockers were recorded in the stand-up notes across the week."
      - "Active ticket work occurred on Monday, Tuesday, and Thursday."
    work_detail:
      - "Done items included reporting debounce, checkout price display, discounted transaction breakdown, pay-link lifecycle, and two marketplace admin fixes."
      - "Pending-review items focused on admin usability rather than new investigation."
      - "Validation activity showed up in both ticket movement and staging notes."
    presenter_notes: "Use the counts as a quick summary, but immediately connect them to the type of work behind them so the audience hears more than just numbers. Mention the staging verification pattern and the clean blocker status."
    takeaway: "The week ended with checked fixes and a short open list."
  - key: "activity-flow"
    title: "Activity Flow"
    objective_summary: "Issues were documented, moved into work or review, and checked where possible across Monday, Tuesday, and Thursday."
    why_it_matters: "This shows progress through the week rather than only end-state counts."
    supporting_evidence:
      - "Done: NGN-561, NGN-589, NGN-562, NGN-590, NGN-624, NGN-628"
      - "Pending Review: NGN-600, NGN-630, NGN-631, NGN-632"
      - "No qualifying activity on Wednesday or Friday."
    work_detail:
      - "NGN-561 moved through validation on reporting search behavior on Monday."
      - "NGN-589 and NGN-562 moved through validation on payment-related behavior on Tuesday and Thursday."
      - "NGN-624 and NGN-628 closed marketplace admin issues after creation and follow-through on Thursday."
      - "NGN-600, NGN-630, NGN-631, and NGN-632 formed the review queue for remaining admin usability work on Tuesday and Thursday."
      - "NGN-590 was created on Tuesday to track pay-link lifecycle correction."
    presenter_notes: "Describe how tickets moved through the week, then point to the tickets that closed versus the tickets that stayed in review so the flow is tied back to actual work. Note the gap days and what that means for pacing."
    takeaway: "The week ended with a small amount of open work, not with open uncertainty."
  - key: "priority-work"
    title: "Priority Work"
    objective_summary: "A focused set of tickets captures the work completed, the checks performed, and the remaining follow-through."
    why_it_matters: "These items show the work with enough detail for team visibility without listing every ticket."
    supporting_evidence:
      - "NGN-561 verified debounced search across Reporting tables."
      - "NGN-589 corrected item prices on the payment complete page."
      - "NGN-562 verified discounted transaction detail values."
      - "NGN-624 and NGN-628 improved marketplace admin behavior."
      - "NGN-600, NGN-630, NGN-631, and NGN-632 remained in pending review."
    work_detail:
      - "NGN-561: tested and confirmed the debounce behavior in staging with a PASS result and explicit verification details for Transactions, Batches, Deposits, and Disputes tables."
      - "NGN-589: fixed the display issue so completed Pay Link checkouts showed the correct item prices instead of defaulting to $0, with fallback to unitPrice times quantity when item.total is missing."
      - "NGN-562: verified the Transaction Details modal now shows correct Subtotal, Discount, and Total Charge values on freshly-created discounted Pay Link transactions in staging."
      - "NGN-590: created ticket to track correction of pay-link status and usage-count behavior after successful payments, preventing premature COMPLETED state on multi-use links."
      - "NGN-624: verified in staging that duplicate category slugs now show a readable validation message instead of a raw Prisma unique constraint error."
      - "NGN-628: verified in staging that App Installs now loads without the prior GraphQL environment and permissions errors."
      - "NGN-600: created ticket to isolate Partner Users search loading to table scope and preserve typing focus, currently in pending review."
      - "NGN-630: created ticket to refetch the service providers list after provider creation so newly created providers appear without manual refresh, currently in pending review."
      - "NGN-631: created ticket to allow clipboard copy from Customer Contacts email field by addressing the blocked Clipboard API permissions policy, currently in pending review."
      - "NGN-632: created ticket to fix Customers table cutoff and add navigation controls for large result sets, currently in pending review."
    presenter_notes: "Spend more time here than on the other sections. Name the tickets, state what was done on each one in plain language, and separate completed work from the review queue. For the completed items, mention the staging verification and what was checked. For the review queue, describe the specific behavior that needs fixing."
    takeaway: "The priority set shows both completed fixes with verification and pending follow-through with clear scope."
  - key: "impact"
    title: "What Changed"
    objective_summary: "Several common workflows now return clearer results or have a defined next step."
    why_it_matters: "This ties the ticket work back to what changed in the product or in the work queue."
    supporting_evidence:
      - "Reporting table searches no longer fire excessive GraphQL requests on every keystroke."
      - "Checkout values and transaction details were corrected or verified for Pay Link flows."
      - "Marketplace admin error handling was clarified for category creation and app installs."
      - "Search and table behavior issues were isolated into the remaining queue with specific reproduction steps."
    work_detail:
      - "Completed reporting ticket reduced unnecessary network requests and improved search responsiveness."
      - "Completed checkout tickets reduced incorrect or unclear payment details on success pages and transaction modals."
      - "Completed marketplace admin tickets removed raw error exposure and restored access to App Installs."
      - "The remaining usability items were narrowed into specific review-ready tasks with clear acceptance criteria instead of broad complaints."
    presenter_notes: "Explain what changed because of the ticket work, but keep it plain. The point is to connect the work to visible outcomes, not to oversell it. Mention the user-facing benefits where they are concrete."
    takeaway: "The main result is clearer workflow behavior, reduced error exposure, and a cleaner remaining queue."
  - key: "next-week"
    title: "Next-Week Commitments"
    objective_summary: "The remaining work can move through review and closure next week."
    why_it_matters: "The open queue is already defined with specific behavior to validate."
    supporting_evidence:
      - "NGN-600 covers Partner Users search reload behavior."
      - "NGN-630 covers service provider refresh behavior after creation."
      - "NGN-631 covers clipboard copy behavior from Customer Contacts."
      - "NGN-632 covers customer table navigation and cutoff behavior."
    work_detail:
      - "The next week starts with four known review items rather than new intake."
      - "Each item already has a clear behavior to validate or close."
      - "The queue is concentrated in admin usability follow-through."
      - "No major blockers were reported that would prevent these items from moving forward."
    presenter_notes: "Close with the specific open items and what needs to happen on them. Keep this section practical and direct. Emphasize that the scope is already well-defined."
    takeaway: "Next week starts with a short, specific queue."
closing:
  objective: "The week covered completed fixes, completed checks, and a short list of remaining follow-through with no major blockers."
  presenter_notes: "Close by restating what was completed, what was checked, and what remains in the queue. Keep the ending plain and definite. Mention the staging verification pattern and the focused nature of the remaining work."
