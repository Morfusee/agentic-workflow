interface:
  display_name: "Weekly Ticket Slideshow Generator"
  short_description: "Turn weekly ticket evidence into a story-driven HTML deck"
  default_prompt: "Use $weekly-ticket-slideshow-generator to transform weekly ticket dumps and stand-up scripts into a story-driven Reveal-style HTML deck. Group work into themes instead of one slide per ticket, explain what happened and why it mattered, make changes and follow-through explicit, and let the LLM author the final slideshow HTML directly instead of relying on deterministic renderer scripts."
